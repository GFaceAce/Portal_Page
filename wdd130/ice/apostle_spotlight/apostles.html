<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <style>
        /* Insert styles here */
        /* body #e8eced
        text-family: arial 
        grid 
        background for card is christus */
    </style>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Insert HTML elements here -->
     <!-- 
    div class="card"
        div FirstPres - title, pictures
        div apostles - title, pictures
    -->
    <div class="card">
        <div>
            <div>
                <h1>First Presidency</h1>
            </div>
            <div id="first_pres_grid">
                <img src="images/eyring.webp" alt="Picture of Henry B. Eyring">
                <img class="pres" src="images/oaks.webp" alt="Picture of Dallin H. Oaks">
                <img src="images/christofferson.webp" alt="Picture of D. Todd Christofferson">
            </div>
        </div>
        <div>
            <div>
                <h3>Quorum of the Twelve Apostles</h3>
            </div>
            <div id="apostles_grid">
                <img src="images/holland.webp" alt="Picture of Jeffrey R. Holland">
                <img src="images/uchtdorf.webp" alt="Picture of Dieter F. Uchtdorf">
                <img src="images/bednar.webp" alt="Picture of David A. Bednar">
                <img src="images/cook.webp" alt="Picture of Quentin L. Cook">
                <img src="images/anderson.webp" alt="Picture of Neil L. Anderson">
                <img src="images/rasband.webp" alt="Picture of Ronald A. Rasband">
                <img src="images/stevenson.webp" alt="Picture of Gary E. Stevenson">
                <img src="images/renlund.webp" alt="Picture of Dale G. Renlund">
                <img src="images/gong.webp" alt="Picture of Gerrit W. Gong">
                <img src="images/soares.webp" alt="Picture of Ulisses Soares">
                <img src="images/kearon.webp" alt="Picture of Patrick Kearon">
                <img src="images/causse.webp" alt="Picture of Gérald Caussé">
            </div>
        </div>
    </div>
</body>
</html>
